<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SubTrack 訂閱</title>
    <link rel="stylesheet" href="add-edit.css">
  </head>
  <body>
    <main class="page-shell">
      <header class="page-header">
        <div>
          <p class="eyebrow">SubTrack</p>
          <h1 id="page-title">新增訂閱</h1>
        </div>
        <button id="close-page" class="icon-button" type="button" title="關閉" aria-label="關閉">×</button>
      </header>

      <form id="subscription-form" class="form-panel" novalidate>
        <label>
          <span>常見服務</span>
          <select id="preset-select">
            <option value="">自訂服務</option>
          </select>
        </label>

        <label>
          <span>服務名稱</span>
          <input id="name" name="name" type="text" autocomplete="off" required>
        </label>

        <div class="form-grid">
          <label>
            <span>分類</span>
            <select id="category" name="category" required></select>
          </label>

          <label>
            <span>幣別</span>
            <select id="currency" name="currency">
              <option value="TWD">TWD</option>
              <option value="USD">USD</option>
              <option value="JPY">JPY</option>
              <option value="EUR">EUR</option>
            </select>
          </label>
        </div>

        <div class="form-grid">
          <label>
            <span>費用金額</span>
            <input id="fee" name="fee" type="number" min="0.01" step="0.01" required>
          </label>

          <label>
            <span>扣款週期</span>
            <select id="cycle" name="cycle">
              <option value="monthly">每月</option>
              <option value="yearly">每年</option>
              <option value="custom">自訂天數</option>
            </select>
          </label>
        </div>

        <label id="cycle-days-row" hidden>
          <span>自訂週期天數</span>
          <input id="cycle-days" name="cycleDays" type="number" min="1" step="1">
        </label>

        <label>
          <span>下次扣款日期</span>
          <input id="next-billing-date" name="nextBillingDate" type="date" required>
        </label>

        <fieldset>
          <legend>提前提醒</legend>
          <div class="checkbox-grid">
            <label><input type="checkbox" name="reminderDays" value="1"> 1 天</label>
            <label><input type="checkbox" name="reminderDays" value="3"> 3 天</label>
            <label><input type="checkbox" name="reminderDays" value="7"> 7 天</label>
            <label><input type="checkbox" name="reminderDays" value="14"> 14 天</label>
          </div>
        </fieldset>

        <div class="form-grid">
          <label>
            <span>品牌顏色</span>
            <input id="color" name="color" type="color" value="#ffffff">
          </label>

          <label class="active-row">
            <span>啟用狀態</span>
            <input id="is-active" name="isActive" type="checkbox" checked>
          </label>
        </div>

        <label>
          <span>備註</span>
          <textarea id="notes" name="notes" rows="4"></textarea>
        </label>

        <p id="form-message" class="form-message" role="status"></p>

        <div class="form-actions">
          <button id="cancel" class="secondary-button" type="button">取消</button>
          <button class="primary-button" type="submit">儲存</button>
        </div>
      </form>
    </main>
    <script type="module" src="add-edit.js"></script>
  </body>
</html>
