<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SubTrack 訂閱</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/theme.css">
    <link rel="stylesheet" href="add-edit.css">
  </head>
  <body>
    <main class="page-shell">
      <header class="page-header">
        <div>
          <p class="eyebrow">SubTrack</p>
          <h1 id="page-title">新增訂閱</h1>
        </div>
        <button id="close-page" class="icon-button" type="button" title="關閉" aria-label="關閉">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M18 6 6 18"></path>
            <path d="m6 6 12 12"></path>
          </svg>
        </button>
      </header>

      <form id="subscription-form" class="form-panel surface-panel" novalidate>
        <section class="form-section">
          <div class="section-heading">
            <p class="eyebrow">基本資料</p>
            <h2>這筆訂閱是什麼？</h2>
          </div>

          <label>
            <span>快速套用</span>
            <div class="preset-row">
              <span id="preset-preview" class="preset-preview" aria-hidden="true"></span>
              <select id="preset-select">
                <option value="">不使用預設</option>
              </select>
            </div>
          </label>

          <label>
            <span>服務名稱</span>
            <input id="name" name="name" type="text" autocomplete="off" required placeholder="例如 Netflix、ChatGPT、Spotify">
          </label>

          <div class="form-grid two">
            <label>
              <span>分類</span>
              <select id="category" name="category" required></select>
            </label>

            <label>
              <span>品牌色</span>
              <input id="color" name="color" type="color" value="#5c4efa">
            </label>
          </div>
        </section>

        <section class="form-section">
          <div class="section-heading">
            <p class="eyebrow">扣款設定</p>
            <h2>金額、週期與日期</h2>
          </div>

          <div class="form-grid two">
            <label>
              <span>訂閱金額</span>
              <input id="fee" name="fee" type="number" min="0.01" step="0.01" required placeholder="0">
            </label>

            <label>
              <span>幣別</span>
              <select id="currency" name="currency">
                <option value="TWD">TWD</option>
                <option value="USD">USD</option>
                <option value="JPY">JPY</option>
                <option value="EUR">EUR</option>
              </select>
            </label>
          </div>

          <div class="form-grid two">
            <label>
              <span>付款方式</span>
              <select id="payment-method" name="paymentMethod">
                <option value="credit_card">信用卡</option>
                <option value="debit_card">金融卡</option>
                <option value="bank_transfer">銀行轉帳</option>
                <option value="mobile_payment">行動支付</option>
                <option value="cash">現金</option>
                <option value="other">其他</option>
              </select>
            </label>

            <label>
              <span>扣款週期</span>
              <select id="cycle" name="cycle">
                <option value="monthly">每月</option>
                <option value="yearly">每年</option>
                <option value="custom">自訂天數</option>
                <option value="once">單次訂閱</option>
              </select>
            </label>
          </div>

          <label id="cycle-days-row" hidden>
            <span>自訂週期天數</span>
            <input id="cycle-days" name="cycleDays" type="number" min="1" step="1">
          </label>

          <p id="once-hint" class="hint-box" hidden>單次訂閱到期後會自動移到已到期清單，需要時可以重新啟用。</p>

          <div class="form-grid two">
            <label>
              <span>下次扣款日期</span>
              <input id="next-billing-date" name="nextBillingDate" type="date" required>
            </label>

            <label>
              <span>訂閱開始日</span>
              <input id="start-date" name="startDate" type="date" required>
            </label>
          </div>

          <label>
            <span>狀態</span>
            <select id="status" name="status">
              <option value="active">訂閱中</option>
              <option value="paused">已暫停</option>
              <option value="expired">已到期</option>
            </select>
          </label>
        </section>

        <section class="form-section">
          <div class="section-heading">
            <p class="eyebrow">共同訂閱</p>
            <h2>是否需要分攤？</h2>
          </div>

          <label>
            <span>訂閱類型</span>
            <select id="subscription-scope" name="subscriptionScope">
              <option value="personal">個人訂閱</option>
              <option value="shared">共同訂閱</option>
            </select>
          </label>

          <div id="shared-fields" class="shared-fields" hidden>
            <label>
              <span>共同訂閱成員</span>
              <textarea id="shared-with" name="sharedWith" rows="3" placeholder="每行一位，或用逗號分隔"></textarea>
            </label>

            <div class="form-grid two">
              <label>
                <span>分攤人數</span>
                <input id="split-count" name="splitCount" type="number" min="2" step="1" value="2">
              </label>
              <label>
                <span>個人負擔金額</span>
                <input id="personal-fee" name="personalFee" type="number" min="0.01" step="0.01">
              </label>
            </div>

            <p id="split-preview" class="hint-box">選擇共同訂閱後，系統會自動估算你的個人負擔。</p>
          </div>
        </section>

        <section class="form-section">
          <div class="section-heading">
            <p class="eyebrow">提醒與備註</p>
            <h2>扣款前要怎麼提醒？</h2>
          </div>

          <fieldset>
            <legend>扣款提醒</legend>
            <div class="checkbox-grid">
              <label><input type="checkbox" name="reminderDays" value="1"> 前 1 天</label>
              <label><input type="checkbox" name="reminderDays" value="3"> 前 3 天</label>
              <label><input type="checkbox" name="reminderDays" value="7"> 前 7 天</label>
              <label><input type="checkbox" name="reminderDays" value="14"> 前 14 天</label>
            </div>
          </fieldset>

          <label>
            <span>備註</span>
            <textarea id="notes" name="notes" rows="4" placeholder="例如付款帳單、家庭分攤規則或取消注意事項"></textarea>
          </label>
        </section>

        <p id="form-message" class="form-message" role="status"></p>

        <div class="form-actions">
          <button id="cancel" class="secondary-button" type="button">取消</button>
          <button class="primary-button" type="submit">儲存</button>
        </div>
      </form>
    </main>
    <script type="module" src="add-edit.js"></script>
  </body>
</html>
