<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SubTrack 訂閱</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="add-edit.css">
  </head>
  <body>
    <main class="page-shell">
      <header class="page-header">
        <div>
          <p class="eyebrow">SubTrack</p>
          <h1 id="page-title">新增訂閱</h1>
        </div>
        <button id="close-page" class="icon-button" type="button" title="關閉" aria-label="關閉">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M18 6 6 18"></path>
            <path d="m6 6 12 12"></path>
          </svg>
        </button>
      </header>

      <form id="subscription-form" class="form-panel" novalidate>
        <label>
          <span>常見服務</span>
          <div class="preset-row">
            <span id="preset-preview" class="preset-preview" aria-hidden="true"></span>
            <select id="preset-select">
              <option value="">自訂服務</option>
            </select>
          </div>
        </label>

        <label>
          <span>服務名稱</span>
          <input id="name" name="name" type="text" autocomplete="off" required>
        </label>

        <label>
          <span>分類</span>
          <select id="category" name="category" required></select>
        </label>

        <label>
          <span>費用金額</span>
          <input id="fee" name="fee" type="number" min="0.01" step="0.01" required>
        </label>

        <label>
          <span>幣別</span>
          <select id="currency" name="currency">
            <option value="TWD">TWD</option>
            <option value="USD">USD</option>
            <option value="JPY">JPY</option>
            <option value="EUR">EUR</option>
          </select>
        </label>

        <label>
          <span>付款方式</span>
          <select id="payment-method" name="paymentMethod">
            <option value="credit_card">信用卡</option>
            <option value="debit_card">金融卡</option>
            <option value="bank_transfer">銀行轉帳</option>
            <option value="mobile_payment">行動支付</option>
            <option value="cash">現金</option>
            <option value="other">其他</option>
          </select>
        </label>

        <fieldset>
          <legend>訂閱類型</legend>
          <label>
            <span>訂閱類型</span>
            <select id="subscription-scope" name="subscriptionScope">
              <option value="personal">個人訂閱</option>
              <option value="shared">共同訂閱</option>
            </select>
          </label>
          <div id="shared-fields" class="shared-fields" hidden>
            <label>
              <span>共同訂閱成員</span>
              <textarea id="shared-with" name="sharedWith" rows="3" placeholder="例如：小美、小華"></textarea>
            </label>
            <label>
              <span>分攤人數（含自己）</span>
              <input id="split-count" name="splitCount" type="number" min="2" step="1" value="2">
            </label>
            <label>
              <span>我個人負擔金額</span>
              <input id="personal-fee" name="personalFee" type="number" min="0.01" step="0.01">
            </label>
            <p class="hint">若未手動填寫，系統會用費用金額除以分攤人數估算；TWD/JPY 不顯示小數，不能整除時你的負擔會預設為多 1 元的那份。</p>
          </div>
        </fieldset>

        <label>
          <span>扣款週期</span>
          <select id="cycle" name="cycle">
            <option value="monthly">每月</option>
            <option value="yearly">每年</option>
            <option value="custom">自訂天數</option>
            <option value="once">單次訂閱（不自動續期）</option>
          </select>
        </label>

        <label id="cycle-days-row" hidden>
          <span>自訂週期天數</span>
          <input id="cycle-days" name="cycleDays" type="number" min="1" step="1">
        </label>

        <p id="once-hint" class="hint" hidden>到期後將自動標記為已到期，可隨時重新啟用。</p>

        <label>
          <span>下次扣款日期</span>
          <input id="next-billing-date" name="nextBillingDate" type="date" required>
        </label>

        <label>
          <span>訂閱開始日</span>
          <input id="start-date" name="startDate" type="date" required>
        </label>

        <label>
          <span>狀態</span>
          <select id="status" name="status">
            <option value="active">訂閱中</option>
            <option value="paused">已暫停</option>
            <option value="expired">已到期</option>
          </select>
        </label>

        <fieldset>
          <legend>提前提醒</legend>
          <div class="checkbox-grid">
            <label><input type="checkbox" name="reminderDays" value="1"> 前 1 天</label>
            <label><input type="checkbox" name="reminderDays" value="3"> 前 3 天</label>
            <label><input type="checkbox" name="reminderDays" value="7"> 前 7 天</label>
            <label><input type="checkbox" name="reminderDays" value="14"> 前 14 天</label>
          </div>
        </fieldset>

        <label>
          <span>品牌顏色</span>
          <input id="color" name="color" type="color" value="#5c4efa">
        </label>

        <label>
          <span>備註</span>
          <textarea id="notes" name="notes" rows="4"></textarea>
        </label>

        <p id="form-message" class="form-message" role="status"></p>

        <div class="form-actions">
          <button id="cancel" class="secondary-button" type="button">取消</button>
          <button class="primary-button" type="submit">儲存</button>
        </div>
      </form>
    </main>
    <script type="module" src="add-edit.js"></script>
  </body>
</html>
