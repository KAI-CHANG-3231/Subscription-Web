<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SubTrack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/theme.css">
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup-shell">
      <header class="summary surface-panel" aria-label="本月有效總支出">
        <div class="summary-copy">
          <p class="eyebrow">本月有效總支出</p>
          <h1 id="monthly-total">--</h1>
          <p id="monthly-change" class="summary-change mono">只計算訂閱中項目</p>
        </div>
        <div class="summary-actions">
          <button id="open-dashboard" class="icon-button" type="button" title="開啟總覽" aria-label="開啟總覽">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="3" y="3" width="7" height="7" rx="1.5"></rect>
              <rect x="14" y="3" width="7" height="7" rx="1.5"></rect>
              <rect x="14" y="14" width="7" height="7" rx="1.5"></rect>
              <rect x="3" y="14" width="7" height="7" rx="1.5"></rect>
            </svg>
          </button>
          <button id="open-options" class="icon-button" type="button" title="開啟設定" aria-label="開啟設定">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Z"></path>
              <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 .6l-.09.09a2 2 0 0 1-3.82 0L10 20a1.7 1.7 0 0 0-1-.6 1.7 1.7 0 0 0-1.88.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-.6-1l-.09-.09a2 2 0 0 1 0-3.82L4 10a1.7 1.7 0 0 0 .6-1 1.7 1.7 0 0 0-.34-1.88l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-.6l.09-.09a2 2 0 0 1 3.82 0L14 4a1.7 1.7 0 0 0 1 .6 1.7 1.7 0 0 0 1.88-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 9c.07.38.28.72.6 1l.09.09a2 2 0 0 1 0 3.82L20 14c-.32.28-.53.62-.6 1Z"></path>
            </svg>
          </button>
        </div>
      </header>

      <nav class="status-tabs surface-panel" aria-label="訂閱狀態篩選">
        <span id="status-tab-indicator" class="status-tab-indicator" aria-hidden="true"></span>
        <button class="status-tab active" type="button" data-status="active">訂閱中</button>
        <button class="status-tab" type="button" data-status="paused">已暫停</button>
        <button class="status-tab" type="button" data-status="expired">已到期</button>
      </nav>

      <section aria-label="訂閱清單">
        <div class="section-title">
          <div>
            <p class="eyebrow">清單</p>
            <h2 id="list-title">訂閱中</h2>
          </div>
          <span id="subscription-count" class="mono">0 項</span>
        </div>
        <div id="subscription-list" class="subscription-list"></div>
        <p id="empty-state" class="empty-state" hidden>目前沒有符合條件的訂閱。</p>
      </section>

      <footer>
        <button id="add-subscription" class="primary-button" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M5 12h14"></path>
            <path d="M12 5v14"></path>
          </svg>
          <span>新增訂閱</span>
        </button>
      </footer>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
