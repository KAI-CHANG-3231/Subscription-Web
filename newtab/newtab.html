<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SubTrack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/theme.css">
    <link rel="stylesheet" href="newtab.css">
  </head>
  <body>
    <main id="app" class="newtab-shell">
      <header class="page-header surface-panel">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">S</span>
          <div>
            <p class="eyebrow">SubTrack</p>
            <h1>訂閱總覽</h1>
            <p id="today-label" class="today-label"></p>
          </div>
        </div>

        <div class="header-actions">
          <section class="summary-card monthly-card" aria-label="本月有效訂閱總支出">
            <span>本月有效總支出</span>
            <strong id="monthly-total">--</strong>
            <em id="monthly-change" class="mono">只計算訂閱中項目</em>
          </section>
          <section class="summary-card insight-card" aria-label="訂閱摘要">
            <span>訂閱摘要</span>
            <strong id="subscription-count" class="mono">0 項</strong>
            <div id="nearest-billing-list" class="nearest-list"></div>
          </section>
          <section class="summary-card alert-card" aria-label="提醒概覽">
            <span>提醒概覽</span>
            <div class="alert-metrics">
              <div>
                <strong id="due-soon-count" class="mono">0</strong>
                <small>7 天內扣款</small>
              </div>
              <div>
                <strong id="expired-count" class="mono">0</strong>
                <small>已到期</small>
              </div>
            </div>
          </section>
          <button id="open-options" class="icon-button" type="button" title="設定" aria-label="設定">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Z"></path>
              <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 .6l-.09.09a2 2 0 0 1-3.82 0L10 20a1.7 1.7 0 0 0-1-.6 1.7 1.7 0 0 0-1.88.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-.6-1l-.09-.09a2 2 0 0 1 0-3.82L4 10a1.7 1.7 0 0 0 .6-1 1.7 1.7 0 0 0-.34-1.88l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-.6l.09-.09a2 2 0 0 1 3.82 0L14 4a1.7 1.7 0 0 0 1 .6 1.7 1.7 0 0 0 1.88-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 9c.07.38.28.72.6 1l.09.09a2 2 0 0 1 0 3.82L20 14c-.32.28-.53.62-.6 1Z"></path>
            </svg>
          </button>
        </div>
      </header>

      <div class="filters-row">
        <nav id="category-tabs" class="category-tabs" aria-label="分類篩選">
          <span id="tab-indicator" class="tab-indicator" aria-hidden="true"></span>
        </nav>
        <label class="status-filter">
          <span>狀態</span>
          <select id="status-filter">
            <option value="active">訂閱中</option>
            <option value="paused">已暫停</option>
            <option value="expired">已到期</option>
            <option value="all">全部狀態</option>
          </select>
        </label>
      </div>

      <section>
        <div id="subscription-grid" class="subscription-grid"></div>
        <p id="empty-state" class="empty-state" hidden>目前沒有符合條件的訂閱。</p>
      </section>

      <button id="add-subscription" class="fab" type="button" title="新增訂閱" aria-label="新增訂閱">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M5 12h14"></path>
          <path d="M12 5v14"></path>
        </svg>
      </button>
    </main>
    <script type="module" src="newtab.js"></script>
  </body>
</html>
