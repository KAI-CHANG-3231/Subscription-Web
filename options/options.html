<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SubTrack 設定</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/theme.css">
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main class="page-shell">
      <header class="page-header">
        <div>
          <p class="eyebrow">SubTrack</p>
          <h1>設定</h1>
        </div>
        <button id="back-dashboard" class="back-button" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M19 12H5"></path>
            <path d="m12 19-7-7 7-7"></path>
          </svg>
          <span>回到總覽</span>
        </button>
      </header>

      <form id="settings-form" class="panel surface-panel" novalidate>
        <section class="section">
          <div class="section-heading">
            <p class="eyebrow">顯示與匯率</p>
            <h2>主畫面的總支出怎麼顯示？</h2>
          </div>

          <label>
            <span>主畫面總支出顯示幣別</span>
            <select id="default-currency">
              <option value="TWD">TWD</option>
              <option value="USD">USD</option>
              <option value="JPY">JPY</option>
              <option value="EUR">EUR</option>
            </select>
          </label>
          <p class="hint">Popup 與 Dashboard 會先依原始幣別加總，再使用下方保存的匯率換算成這個主要幣別。</p>

          <fieldset>
            <legend>總金額顯示</legend>
            <div class="radio-row" role="radiogroup" aria-label="總金額顯示">
              <label><input type="radio" name="summaryAmountMode" value="personal"> 顯示分攤後個人金額</label>
              <label><input type="radio" name="summaryAmountMode" value="gross"> 顯示未分攤總金額</label>
            </div>
          </fieldset>

          <div class="rate-grid">
            <label>
              <span>1 USD = ? TWD</span>
              <input id="rate-usd" type="number" min="0.0001" step="0.0001">
            </label>
            <label>
              <span>1 JPY = ? TWD</span>
              <input id="rate-jpy" type="number" min="0.0001" step="0.0001">
            </label>
            <label>
              <span>1 EUR = ? TWD</span>
              <input id="rate-eur" type="number" min="0.0001" step="0.0001">
            </label>
          </div>
          <p id="rate-preview" class="preview-box mono">輸入匯率後會在這裡預覽換算結果。</p>
        </section>

        <section class="section">
          <div class="section-heading">
            <p class="eyebrow">功能偏好</p>
            <h2>通知與顯示</h2>
          </div>

          <label class="toggle-row">
            <span>啟用扣款通知</span>
            <input id="enable-notifications" type="checkbox">
          </label>
          <label class="toggle-row">
            <span>覆蓋 Chrome 新分頁</span>
            <input id="enable-newtab" type="checkbox" disabled>
          </label>
          <p class="hint">SubTrack 目前保留 Chrome 原生新分頁；Dashboard 可從 popup 或此設定頁開啟。</p>
          <label class="toggle-row">
            <span>Dashboard 顯示已到期訂閱</span>
            <input id="show-expired" type="checkbox">
          </label>
        </section>

        <p id="settings-message" class="message" role="status"></p>
        <button class="primary-button" type="submit">儲存設定</button>
      </form>

      <section class="panel surface-panel section">
        <div class="section-heading">
          <p class="eyebrow">分類管理</p>
          <h2>整理你的訂閱分類</h2>
        </div>
        <div class="category-add-row">
          <label>
            <span>新增分類</span>
            <input id="category-name" type="text" autocomplete="off" placeholder="例如 學習、家庭、工作">
          </label>
          <button id="add-category" class="secondary-button" type="button">新增</button>
        </div>
        <div id="category-list" class="category-list" aria-label="分類清單"></div>
      </section>

      <section class="panel surface-panel section">
        <div class="section-heading">
          <p class="eyebrow">資料管理</p>
          <h2>備份與還原</h2>
        </div>
        <div class="action-row">
          <button id="export-data" class="secondary-button" type="button">匯出資料</button>
        </div>
        <div class="import-box">
          <input id="import-file" type="file" accept="application/json,.json">
          <div class="radio-row" role="radiogroup" aria-label="匯入模式">
            <label><input type="radio" name="importMode" value="merge" checked> 合併</label>
            <label><input type="radio" name="importMode" value="replace"> 取代</label>
          </div>
          <button id="import-data" class="secondary-button" type="button">匯入資料</button>
        </div>
      </section>

      <section class="panel surface-panel section danger-zone">
        <div class="section-heading">
          <p class="eyebrow">危險操作</p>
          <h2>清除 SubTrack 資料</h2>
        </div>
        <button id="clear-data" class="danger-button" type="button">清除所有資料</button>
      </section>
    </main>
    <script type="module" src="options.js"></script>
  </body>
</html>
